<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Driver Grid - Sandbox Engine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* FIX: Robust, explicit sizing and styling for simulated taxi nodes */
        .sim-taxi-vector-icon {
            background: rgba(20, 20, 20, 0.95) !important;
            border: 2px solid #ffcc00 !important;
            border-radius: 6px !important;
            color: #ffcc00 !important;
            text-align: center !important;
            font-weight: 900 !important;
            font-size: 11px !important;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }
        /* FIX: Explicit styling for dynamic alert markers so text doesn't bleed into the background */
        .alert-caution-wrapper {
            background: #ff3b30 !important;
            color: white !important;
            padding: 5px 10px !important;
            border-radius: 6px !important;
            font-size: 11px !important;
            font-weight: bold !important;
            border: 1px solid white !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5) !important;
            white-space: nowrap !important;
            display: inline-block !important;
        }
        /* Adjusting Leaflet internal popups to style nicely with dark theme */
        .leaflet-popup-content-wrapper {
            background: #222 !important;
            color: #fff !important;
            border: 1px solid #444 !important;
            border-radius: 8px !important;
        }
        .leaflet-popup-tip {
            background: #222 !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="admin-panel" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 2000; background: rgba(15, 15, 15, 0.96); border: 2px solid #ffcc00; padding: 14px; border-radius: 14px; color: white; width: 88%; max-width: 380px; box-shadow: 0 6px 20px rgba(0,0,0,0.85);">
        <strong style="color: #ffcc00; display: block; margin-bottom: 8px; text-align: center; letter-spacing: 1px; font-size: 13px;">🎛️ ADMIN APP CONTROLS</strong>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <label style="font-size: 13px; font-weight: 500;">Alert Radius: <span id="radius-val" style="font-weight: bold; color: #34c759; font-size: 15px;">10</span> km</label>
            <input type="range" id="radius-slider" min="1" max="25" value="10" style="width: 58%; cursor: pointer;" oninput="updateAdminRadius(this.value)">
        </div>
        <div style="font-size: 10px; color: #aaa; text-align: center; margin-top: 8px; border-top: 1px solid #333; padding-top: 6px;">
            Simulating local vs wide-area filtering logic live.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let vehiclePos = { lat: 49.2611, lng: -123.1281 }; // Downtown/Central Vancouver core anchoring
        let currentAddressData = { houseNumber: "", streetName: "" };
        
        let simulatedTaxis = [];
        let simMarkersMap = {}; 
        let adminAlertRadiusKm = 10; 

        // Initialize Map Layout
        function initMap() {
            // FIX: Added padding option to keep popups completely clear of our UI panel boundaries
            map = L.map('map', {
                zoomControl: false,
                closePopupOnClick: false
            }).setView([vehiclePos.lat, vehiclePos.lng], 13);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            // Self icon marker configuration
            const myIcon = L.divIcon({
                className: 'my-vehicle-marker-icon',
                html: '<div style="width:14px; height:14px; background:#34c759; border:2.5px solid white; border-radius:50%; box-shadow: 0 0 8px #34c759;"></div>',
                iconSize: [14, 14],
                iconAnchor: [7, 7]
            });
            L.marker([vehiclePos.lat, vehiclePos.lng], { icon: myIcon }).addTo(map).bindPopup("<b>Your Active Position</b>");
        }

        // Live slider updates
        function updateAdminRadius(val) {
            adminAlertRadiusKm = parseInt(val);
            document.getElementById('radius-val').innerText = val;
            console.log(`[ADMIN] Filtering boundary recalibrated to: ${adminAlertRadiusKm} KM`);
        }

        // Distance formula logic
        function calculateDistanceKm(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2); 
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
            return R * c; 
        }

        // FIX: Re-engineered dynamic markup deployment injection for safety on mobile rendering engines
        function createCautionMarkerOnMap(type, direction, latlng) {
            const dynamicHtml = `<div class="alert-caution-wrapper">⚠️ ${type} (${direction})</div>`;
            
            const cautionIcon = L.divIcon({
                html: dynamicHtml,
                className: 'custom-leaflet-alert-node',
                iconAnchor: [40, 12],
                iconSize: [null, null] // Prevents Leaflet from locking sizes implicitly
            });
            
            const marker = L.marker([latlng.lat, latlng.lng], { icon: cautionIcon }).addTo(map);
            
            let popupContent = `<b>${type} Alert</b><br>Direction: ${direction}`;
            if (currentAddressData.streetName) {
                popupContent += `<br>Near: ${currentAddressData.houseNumber} ${currentAddressData.streetName}`;
            }
            
            marker.bindPopup(popupContent);
        }

        // =========================================================================================
        // 🚀 LIVE SANDBOX SIMULATOR ENGINE (WITH ADAPTIVE DATA FILTERING)
        // =========================================================================================
        function initTaxiSimulator() {
            console.log("Sandbox Engine Online: Deploying Fleet Coordinates...");

            simulatedTaxis = Array.from({ length: 10 }, (_, i) => {
                const idNum = i + 1;
                const spreadFactorLat = idNum > 5 ? 0.14 : 0.02; 
                const spreadFactorLng = idNum > 5 ? 0.18 : 0.02;

                return {
                    id: `sim_cab_${idNum}`,
                    label: `YC${100 + idNum}`,
                    lat: vehiclePos.lat + (Math.random() - 0.5) * spreadFactorLat,
                    lng: vehiclePos.lng + (Math.random() - 0.5) * spreadFactorLng,
                    speed: 0.00010 
                };
            });

            // Animate taxi steps smoothly
            setInterval(() => {
                simulatedTaxis.forEach(taxi => {
                    taxi.lat += (Math.random() - 0.5) * taxi.speed;
                    taxi.lng += (Math.random() - 0.5) * taxi.speed;
                    updateSimulatedMarkerOnMap(taxi);
                });
            }, 3500);

            // Core filtering simulation check loops
            setInterval(() => {
                if (simulatedTaxis.length === 0 || !vehiclePos) return;

                const reportingTaxi = simulatedTaxis[Math.floor(Math.random() * simulatedTaxis.length)];
                const alertPos = L.latLng(reportingTaxi.lat, reportingTaxi.lng);
                const distanceToMe = calculateDistanceKm(vehiclePos.lat, vehiclePos.lng, alertPos.lat, alertPos.lng);

                console.log(`[NETWORK EVENT] Cab ${reportingTaxi.label} dropped alert ${distanceToMe.toFixed(1)} km away.`);

                if (distanceToMe <= adminAlertRadiusKm) {
                    const directions = ['Northbound', 'Southbound', 'Eastbound', 'Westbound'];
                    const randomDirection = directions[Math.floor(Math.random() * directions.length)];
                    
                    const oldHouse = currentAddressData.houseNumber;
                    const oldStreet = currentAddressData.streetName;

                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${alertPos.lat}&lon=${alertPos.lng}&zoom=18`)
                        .then(res => res.json())
                        .then(data => {
                            if (data && data.address) {
                                currentAddressData.streetName = data.address.road || data.address.pedestrian || "Main Route";
                                currentAddressData.houseNumber = data.address.house_number || "";
                            }
                            createCautionMarkerOnMap('Heavy traffic', randomDirection, alertPos);
                            
                            setTimeout(() => {
                                currentAddressData.houseNumber = oldHouse;
                                currentAddressData.streetName = oldStreet;
                            }, 2000);
                        }).catch(() => {
                            createCautionMarkerOnMap('Heavy traffic', randomDirection, alertPos);
                        });
                } else {
                    console.log(`[DATA BLOCKED] Filtered out event at ${distanceToMe.toFixed(1)}km to preserve system pings.`);
                }
            }, 12000); 
        }

        function updateSimulatedMarkerOnMap(taxi) {
            // FIX: Encapsulated label text string neatly within custom-styled css parameters directly
            const iconContent = `<span>${taxi.label}</span>`;
            const simIconStyle = L.divIcon({
                className: 'sim-taxi-vector-icon',
                html: iconContent,
                iconSize: [46, 22],
                iconAnchor: [23, 11]
            });

            if (!simMarkersMap[taxi.id]) {
                simMarkersMap[taxi.id] = L.marker([taxi.lat, taxi.lng], { icon: simIconStyle }).addTo(map);
                simMarkersMap[taxi.id].bindPopup(`<strong>Active Taxi Unit</strong><br>Unit identifier: ${taxi.label}`);
            } else {
                simMarkersMap[taxi.id].setLatLng([taxi.lat, taxi.lng]);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initMap();
            initTaxiSimulator();
        });
    </script>
</body>
</html>
